<button
  [attr.type]="type()"
  [class]="buttonClass()"
  [disabled]="disabled()"
  (click)="handleClick($event)"
>
  @if (iconClass() && iconPosition() === 'left') {
    <i [class]="iconClass()"></i>
  }
  <span class="btn-label"><ng-content></ng-content></span>
  @if (iconClass() && iconPosition() === 'right') {
    <i [class]="iconClass()"></i>
  }
</button>
