<p-toast></p-toast>
<div class="single-auth-view">
  <div class="single-form-shell large">
    <img class="brand-logo small" src="/assets/logo.png" alt="School Logo" />
    <h2 class="title">New Account Registration</h2>

    <form [formGroup]="regForm" class="form-stack">
      <p-floatLabel variant="on">
        <input pInputText id="firstName" formControlName="firstname" class="w-full" />
        <label for="firstName">First Name</label>
      </p-floatLabel>

      <p-floatLabel variant="on">
        <input pInputText id="middleName" formControlName="middlename" class="w-full" />
        <label for="middleName">Middle Name</label>
      </p-floatLabel>

      <p-floatLabel variant="on">
        <input pInputText id="lastName" formControlName="lastname" class="w-full" />
        <label for="lastName">Last Name</label>
      </p-floatLabel>

      <p-floatLabel variant="on">
        <input pInputText id="regEmail" formControlName="email" class="w-full" />
        <label for="regEmail">Email Address</label>
      </p-floatLabel>

      <p-floatLabel variant="on">
        <p-password
          inputId="regPassword"
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          [fluid]="true"
          [inputStyle]="{ width: '100%' }"
        ></p-password>
        <label for="regPassword">Password</label>
      </p-floatLabel>

      <div class="password-checklist">
        <p [class.valid]="validationCheck[0].status">Minimum of 8 characters</p>
        <p [class.valid]="validationCheck[1].status">At least one special character</p>
        <p [class.valid]="validationCheck[2].status">At least one uppercase letter</p>
        <p [class.valid]="validationCheck[3].status">At least one lowercase letter</p>
        <p [class.valid]="validationCheck[4].status">At least one number</p>
      </div>

      <p-floatLabel variant="on">
        <p-password
          inputId="confirmPassword"
          formControlName="cpassword"
          [feedback]="false"
          [toggleMask]="true"
          [fluid]="true"
          [inputStyle]="{ width: '100%' }"
        ></p-password>
        <label for="confirmPassword">Confirm Password</label>
      </p-floatLabel>
      <small
        class="error-text"
        *ngIf="cpasswordControl.touched && cpasswordControl.value !== passwordControl.value"
      >
        Passwords do not match.
      </small>

      <p-floatLabel variant="on">
        <input pInputText id="phoneNumber" formControlName="phonenumber" class="w-full" />
        <label for="phoneNumber">Phone Number</label>
      </p-floatLabel>

      <p-floatLabel variant="on">
        <input pInputText id="altPhoneNumber" formControlName="altphonenumber" class="w-full" />
        <label for="altPhoneNumber">Alternate Phone Number (optional)</label>
      </p-floatLabel>

      <button pButton type="button" class="action-btn" [disabled]="busy" (click)="register()">
        {{ busy ? "Creating..." : "Create Account" }}
      </button>
    </form>

    <p class="switch-text">
      Already have an account?
      <a routerLink="/auth/login" class="inline-link">Login</a>
    </p>
  </div>
</div>
