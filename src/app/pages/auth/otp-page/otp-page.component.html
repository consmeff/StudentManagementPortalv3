<p-toast></p-toast>
<div class="single-auth-view">
  <div class="single-form-shell">
    <img class="brand-logo small" src="/assets/logo.png" alt="School Logo" />
    <h2 class="title">
      {{ isPasswordResetFlow ? "Input One-Time Password (OTP)" : "Verify Account OTP" }}
    </h2>
    <p class="helper-text">A verification code was sent to {{ email }}.</p>

    <form class="otp-form" [formGroup]="otpForm">
      <div class="otp-grid">
        <input
          pInputText
          #box1Input
          formControlName="box1"
          id="register-otp-0"
          type="text"
          maxlength="1"
          class="otp-input"
          (input)="onInput($event, 2)"
          (keydown)="onKeyDown($event, 1)"
          (paste)="onPaste($event)"
        />
        <input
          pInputText
          #box2Input
          formControlName="box2"
          id="register-otp-1"
          type="text"
          maxlength="1"
          class="otp-input"
          (input)="onInput($event, 3)"
          (keydown)="onKeyDown($event, 2)"
        />
        <input
          pInputText
          #box3Input
          formControlName="box3"
          id="register-otp-2"
          type="text"
          maxlength="1"
          class="otp-input"
          (input)="onInput($event, 4)"
          (keydown)="onKeyDown($event, 3)"
        />
        <input
          pInputText
          #box4Input
          formControlName="box4"
          id="register-otp-3"
          type="text"
          maxlength="1"
          class="otp-input"
          (input)="onInput($event, 5)"
          (keydown)="onKeyDown($event, 4)"
        />
        <input
          pInputText
          #box5Input
          formControlName="box5"
          id="register-otp-4"
          type="text"
          maxlength="1"
          class="otp-input"
          (input)="onInput($event, 6)"
          (keydown)="onKeyDown($event, 5)"
        />
        <input
          pInputText
          #box6Input
          formControlName="box6"
          id="register-otp-5"
          type="text"
          maxlength="1"
          class="otp-input"
          (keydown)="onKeyDown($event, 6)"
        />
      </div>

      <button pButton type="button" class="action-btn" [disabled]="!complete || busy" (click)="submitOTP()">
        {{ busy ? "Verifying..." : (isPasswordResetFlow ? "Continue" : "Verify OTP") }}
      </button>
    </form>
  </div>
</div>
