<div class="auth-layout">
  <div class="left-panel">
    <div class="carousel-shell">
      <div
        *ngFor="let imagePath of carouselImages; let index = index"
        class="slide-item"
        [class.active-slide]="activeSlideIndex() === index"
        [style.backgroundImage]="'url(' + imagePath + ')'"
      >
      </div>

      <div class="carousel-indicators">
        <button
          *ngFor="let imagePath of carouselImages; let index = index"
          type="button"
          class="indicator-btn"
          [class.active-indicator]="activeSlideIndex() === index"
          [attr.aria-label]="'Show slide ' + (index + 1)"
          (click)="setActiveSlide(index)"
        ></button>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-shell">
      <img class="brand-logo" src="/assets/logo.png" alt="School Logo" />
      <h2 class="title">Admission Portal</h2>

      <form [formGroup]="loginForm" class="form-stack" (ngSubmit)="login()">
        <p-floatLabel variant="on">
          <input
            pInputText
            id="loginEmail"
            formControlName="email"
            class="w-full"
            autocomplete="email"
            [disabled]="isLoading()"
          />
          <label for="loginEmail">Email Address</label>
        </p-floatLabel>
        <small
          class="error-text"
          *ngIf="loginForm.controls['email'].invalid && loginForm.controls['email'].touched"
        >
          Enter a valid email address.
        </small>

        <p-floatLabel variant="on">
          <p-password
            inputId="loginPassword"
            formControlName="password"
            [feedback]="false"
            [toggleMask]="true"
            [fluid]="true"
            [disabled]="isLoading()"
            [inputStyle]="{ width: '100%' }"
          ></p-password>
          <label for="loginPassword">Password</label>
        </p-floatLabel>
        <small
          class="error-text"
          *ngIf="loginForm.controls['password'].invalid && loginForm.controls['password'].touched"
        >
          Password is required.
        </small>

        <button pButton type="submit" class="action-btn" [disabled]="isLoading()">
          {{ isLoading() ? "Signing In..." : "Login" }}
        </button>
      </form>

      <a routerLink="/auth/request-passwordreset" class="text-link">Forgot Password?</a>
      <p class="switch-text">
        Are you a new applicant?
        <a routerLink="/auth/signup" class="inline-link">Create account</a>
      </p>
    </div>
  </div>
</div>
