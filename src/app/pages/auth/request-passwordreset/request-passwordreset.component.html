<p-toast></p-toast>
<div class="single-auth-view">
  <div class="single-form-shell">
    <img class="brand-logo small" src="/assets/logo.png" alt="School Logo" />
    <h2 class="title">Reset your Password</h2>
    <p class="helper-text">Enter the email address you registered with.</p>

    <form [formGroup]="resetForm" class="form-stack">
      <p-floatLabel variant="on">
        <input pInputText id="forgotEmail" formControlName="email" class="w-full" />
        <label for="forgotEmail">Email Address</label>
      </p-floatLabel>
      <small class="error-text" *ngIf="resetForm.controls.email.invalid && resetForm.controls.email.touched">
        Enter a valid email address.
      </small>

      <button pButton type="button" class="action-btn" [disabled]="busy" (click)="resetPass()">
        {{ busy ? "Sending..." : "Send OTP" }}
      </button>
    </form>

    <a routerLink="/auth/login" class="text-link">Back to Login</a>
  </div>
</div>
