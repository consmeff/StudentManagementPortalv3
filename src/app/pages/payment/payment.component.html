<div class="payment-page">
  <h1 class="page-title">Payment History</h1>

  <div class="history-card">
    <div class="history-header">
      <div>Date</div>
      <div>Payment Type</div>
      <div>Reference Number</div>
      <div>Amount</div>
      <div>Actions</div>
    </div>

    <div class="history-row" *ngFor="let item of paymentHistory">
      <div>{{ item.date }}</div>
      <div class="value-strong">{{ item.paymentType }}</div>
      <div>{{ item.referenceNumber }}</div>
      <div>{{ item.amount }}</div>
      <div>
        <button type="button" class="download-btn" (click)="downloadReceipt(item)">
          <i class="pi pi-download"></i>
          <span>Download</span>
        </button>
      </div>
    </div>

    <div class="empty-row" *ngIf="!isLoading && paymentHistory.length === 0">
      No payment history found.
    </div>
  </div>
</div>
