<div class="pending-flow-page">
  <div class="welcome-line">Welcome,</div>
  <h1 class="applicant-name">{{ dashboardName() }}</h1>

  <div class="hero-card">
    <div class="hero-progress">
      <div class="progress-ring">
        <div class="progress-value">{{ progressPercent() }}%</div>
      </div>
    </div>
    <div class="hero-copy">
      <h2>{{ heroTitle() }}</h2>
      <p>{{ heroDescription() }}</p>
    </div>
    <button pButton type="button" class="continue-btn" (click)="onPrimaryAction()" [disabled]="loadingApplications()">
      {{ loadingApplications() ? "Loading..." : primaryActionLabel() }}
    </button>
  </div>

  <small class="error-hint" *ngIf="loadingError()">{{ loadingError() }}</small>

  <section class="steps-section">
    <h3>Application Steps</h3>

    <div class="steps-list">
      <div class="step-row" *ngFor="let step of applicationSteps(); let last = last">
        <div class="step-marker">
          <span class="marker-circle" [class]="step.status">
            <i *ngIf="step.status === 'completed'" class="pi pi-check"></i>
            <ng-container *ngIf="step.status !== 'completed'">{{ step.index }}</ng-container>
          </span>
          <span class="marker-line" *ngIf="!last"></span>
        </div>

        <div class="step-content" [class]="step.status">
          <div class="step-title">{{ step.title }}</div>
          <div class="step-description">{{ step.description }}</div>
        </div>

        <div class="step-action">
          <div class="step-complete" *ngIf="step.status === 'completed'">
            <span>Completed</span>
            <i class="pi pi-check-circle"></i>
          </div>
          <button
            *ngIf="step.actionLabel"
            pButton
            type="button"
            class="continue-btn"
            [disabled]="loadingApplications() || initializingApplication()"
            (click)="onStepAction(step)"
          >
            {{ step.actionLabel }}
          </button>
        </div>
      </div>
    </div>
  </section>

  <p-dialog
    header="Choose the programme you are applying for"
    [modal]="true"
    [closable]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{ width: '620px' }"
    styleClass="programme-dialog"
    [visible]="showProgrammeDialog()"
    (visibleChange)="onProgrammeDialogVisibilityChange($event)"
  >
    <div class="programme-grid">
      <button
        type="button"
        class="programme-option"
        [class.selected]="selectedApplicationId() === app.id"
        *ngFor="let app of applicationOptions()"
        (click)="selectApplication(app.id)"
      >
        <span class="option-radio"></span>
        <div class="programme-content">
          <div class="programme-name">{{ app.program.name }}</div>
          <div class="programme-meta">{{ app.level.name }} • {{ app.session.name }}</div>
        </div>
      </button>
    </div>

    <div class="dialog-actions">
      <button
        pButton
        type="button"
        class="continue-btn"
        [disabled]="!selectedApplicationId() || initializingApplication()"
        (click)="proceedFromProgramme()"
      >
        {{ initializingApplication() ? "Please wait..." : "Continue" }}
      </button>
    </div>
  </p-dialog>

  <app-application-guideline-modal
    [content]="guidelineContent"
    [visible]="showGuidelineDialog()"
    [accepted]="guidelinesAccepted()"
    [loading]="initializingApplication()"
    [continueLabel]="actionLabels.continueToPayment"
    (visibleChange)="onGuidelineDialogVisibilityChange($event)"
    (acceptedChange)="onGuidelineAcceptedChange($event)"
    (continueClicked)="proceedToPayment()"
  ></app-application-guideline-modal>
</div>
