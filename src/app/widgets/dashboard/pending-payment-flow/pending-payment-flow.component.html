<div class="pending-flow-page">
  <div class="welcome-line">Welcome,</div>
  <h1 class="applicant-name">{{ dashboardName() }}</h1>

  <div class="pending-card" *ngIf="isPaymentPending; else paidTemplate">
    <div class="progress-wrap">
      <div class="progress-ring">
        <div class="progress-value">20%</div>
      </div>
    </div>
    <div class="pending-text">You have an incomplete application</div>
    <button pButton type="button" class="continue-btn" (click)="continueFlow()" [disabled]="loadingApplications()">
      {{ loadingApplications() ? "Loading..." : "Continue" }}
    </button>
  </div>

  <ng-template #paidTemplate>
    <div class="pending-card paid">
      <div class="pending-text">Payment completed. Continue your admission form.</div>
      <button pButton type="button" class="continue-btn" routerLink="/pages/admissionform">Continue</button>
    </div>
  </ng-template>

  <small class="error-hint" *ngIf="loadingError()">{{ loadingError() }}</small>

  <p-dialog
    header="Choose the programme you are applying for"
    [modal]="true"
    [closable]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{ width: '540px' }"
    [(visible)]="showProgrammeDialog"
  >
    <div class="programme-grid">
      <label class="programme-option" *ngFor="let app of applicationOptions()">
        <input
          type="radio"
          name="applicationOption"
          [checked]="selectedApplicationId() === app.id"
          (change)="selectApplication(app.id)"
        />
        <div class="programme-content">
          <div class="programme-name">{{ app.program.name }}</div>
          <div class="programme-meta">{{ app.level.name }} • {{ app.session.name }}</div>
        </div>
      </label>
    </div>

    <div class="dialog-actions">
      <button
        pButton
        type="button"
        class="continue-btn"
        [disabled]="!selectedApplicationId() || initializingApplication()"
        (click)="proceedFromProgramme()"
      >
        {{ initializingApplication() ? "Please wait..." : "Continue" }}
      </button>
    </div>
  </p-dialog>

  <app-application-guideline-modal
    [content]="guidelineContent"
    [visible]="showGuidelineDialog()"
    [accepted]="guidelinesAccepted()"
    [loading]="initializingApplication()"
    continueLabel="Continue to Payment"
    (visibleChange)="showGuidelineDialog.set($event)"
    (acceptedChange)="guidelinesAccepted.set($event)"
    (continueClicked)="proceedToPayment()"
  ></app-application-guideline-modal>
</div>
