<p-dialog
  [header]="content.title"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '560px', maxHeight: '90vh' }"
  [visible]="visible"
  (visibleChange)="onVisibleChange($event)"
>
  <div class="guideline-intro">{{ content.intro }}</div>
  <ol class="guideline-list">
    <li *ngFor="let section of content.sections">
      {{ section.heading }}
      <ul *ngIf="section.items.length > 0">
        <li *ngFor="let item of section.items">{{ item }}</li>
      </ul>
    </li>
  </ol>

  <label class="accept-wrap">
    <input type="checkbox" [checked]="accepted" (change)="onAcceptedToggle($event)" />
    <span>I have read and understand the guideline</span>
  </label>

  <div class="dialog-actions">
    <button pButton type="button" class="continue-btn" [disabled]="!accepted || loading" (click)="onContinue()">
      {{ loading ? "Please wait..." : continueLabel }}
    </button>
  </div>
</p-dialog>
